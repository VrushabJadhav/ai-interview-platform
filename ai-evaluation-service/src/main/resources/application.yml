server:
  port: 8083
ai:
  provider: ${AI_PROVIDER:mock}
spring:
  application:
    name: ai-evaluation-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_eval_db
    username: ai_interview
    password: ai_interview
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
management:
  endpoints:
    web:
      exposure:
        include: health,info
