server:
  port: 8080
spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            key-resolver: "#{@userKeyResolver}"
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: interview-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/interviews/**
        - id: ai-evaluation-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/evaluations/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
        - id: auth-health
          uri: http://localhost:8081
          predicates:
            - Path=/health/auth
          filters:
            - SetPath=/actuator/health
        - id: interview-health
          uri: http://localhost:8082
          predicates:
            - Path=/health/interview
          filters:
            - SetPath=/actuator/health
        - id: ai-evaluation-health
          uri: http://localhost:8083
          predicates:
            - Path=/health/ai-evaluation
          filters:
            - SetPath=/actuator/health
        - id: payment-health
          uri: http://localhost:8084
          predicates:
            - Path=/health/payment
          filters:
            - SetPath=/actuator/health
        - id: notification-health
          uri: http://localhost:8085
          predicates:
            - Path=/health/notification
          filters:
            - SetPath=/actuator/health
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
